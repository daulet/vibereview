name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (for example: v0.3.1)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: vibereview
  TAP_REPO: daulet/homebrew-tap
  TAP_BRANCH: main
  FORMULA_DESC: "TUI for viewing Claude Code and Codex CLI sessions"
  DEB_HOMEPAGE: "https://github.com/daulet/vibereview"
  DEB_DEPENDS: ""
  FORMULA_PATH: Formula/vibereview.rb

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve_tag:
    name: Resolve Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ "${TAG}" != v* ]]; then
            echo "Tag must start with v (received: ${TAG})" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          if [[ -z "${VERSION}" ]]; then
            echo "Could not infer version from tag ${TAG}" >&2
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify Release Candidate
    needs: resolve_tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve_tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Tests
        run: cargo test --all-targets --locked

  build:
    name: Build ${{ matrix.target }}
    needs:
      - resolve_tag
      - verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: vibereview
            deb_arch: amd64
            linker_package: ""
            linker_env: ""
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            binary: vibereview
            deb_arch: arm64
            linker_package: gcc-aarch64-linux-gnu
            linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          - os: macos-14
            target: aarch64-apple-darwin
            binary: vibereview
            deb_arch: ""
            linker_package: ""
            linker_env: ""
          - os: macos-14
            target: x86_64-apple-darwin
            binary: vibereview
            deb_arch: ""
            linker_package: ""
            linker_env: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: vibereview.exe
            deb_arch: ""
            linker_package: ""
            linker_env: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve_tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker
        if: ${{ matrix.linker_package != '' }}
        shell: bash
        env:
          LINKER_PACKAGE: ${{ matrix.linker_package }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends "${LINKER_PACKAGE}"

      - name: Build release binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          LINKER_ENV: ${{ matrix.linker_env }}
        run: |
          if [[ -n "${LINKER_ENV}" ]]; then
            export "${LINKER_ENV?}"
          fi
          cargo build --release --locked --target "${TARGET}"

      - name: Build release binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --locked --target "$env:TARGET"

      - name: Package archive and checksum (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          TARGET_BINARY: ${{ matrix.binary }}
          VERSION: ${{ needs.resolve_tag.outputs.version }}
          DEB_ARCH: ${{ matrix.deb_arch }}
        run: |
          mkdir -p dist
          cp "target/${TARGET}/release/${TARGET_BINARY}" "dist/${BINARY_NAME}"
          tar -C dist -czf "dist/${BINARY_NAME}-${TARGET}.tar.gz" "${BINARY_NAME}"

          if [[ -n "${DEB_ARCH}" ]]; then
            .github/scripts/package_deb.sh \
              --binary "dist/${BINARY_NAME}" \
              --name "${BINARY_NAME}" \
              --version "${VERSION}" \
              --arch "${DEB_ARCH}" \
              --out-dir dist \
              --desc "${FORMULA_DESC}" \
              --homepage "${DEB_HOMEPAGE}" \
              --depends "${DEB_DEPENDS}"
          fi

          rm -f "dist/${BINARY_NAME}"

          python3 - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          target = os.environ["TARGET"]
          artifacts = sorted(
              path
              for path in Path("dist").iterdir()
              if path.is_file() and not path.name.startswith("checksums-")
          )
          checksum_path = Path("dist") / f"checksums-{target}.txt"
          checksum_path.write_text(
              "".join(
                  f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}\n"
                  for path in artifacts
              ),
              encoding="utf-8",
          )
          PY

      - name: Package archive and checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          TARGET_BINARY: ${{ matrix.binary }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/$env:TARGET/release/$env:TARGET_BINARY" "dist/$env:TARGET_BINARY"
          Compress-Archive -Path "dist/$env:TARGET_BINARY" -DestinationPath "dist/$env:BINARY_NAME-$env:TARGET.zip" -Force
          Remove-Item "dist/$env:TARGET_BINARY"

          $digest = (Get-FileHash -Path "dist/$env:BINARY_NAME-$env:TARGET.zip" -Algorithm SHA256).Hash.ToLower()
          "$digest  $env:BINARY_NAME-$env:TARGET.zip" | Out-File -FilePath "dist/checksums-$env:TARGET.txt" -Encoding ascii

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - resolve_tag
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Combine checksums
        shell: bash
        run: |
          cat dist/checksums-*.txt | sort > dist/checksums.txt
          ls -lh dist

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve_tag.outputs.tag }}
          name: ${{ needs.resolve_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/checksums.txt

  update_homebrew:
    name: Update Homebrew Tap
    needs:
      - resolve_tag
      - publish
    runs-on: ubuntu-latest
    steps:
      - name: Require tap token
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            echo "::error::HOMEBREW_TAP_TOKEN is required for release publishing."
            exit 1
          fi

      - name: Checkout release repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Resolve macOS checksums
        id: sha
        shell: bash
        run: |
          cat dist/checksums-*.txt | sort > dist/checksums.txt

          INTEL_SHA="$(awk '$2 ~ /vibereview-x86_64-apple-darwin\.tar\.gz$/ {print $1}' dist/checksums.txt | tail -n1)"
          ARM_SHA="$(awk '$2 ~ /vibereview-aarch64-apple-darwin\.tar\.gz$/ {print $1}' dist/checksums.txt | tail -n1)"

          if [[ -z "${INTEL_SHA}" || -z "${ARM_SHA}" ]]; then
            echo "Failed to locate required macOS checksums in dist/checksums.txt" >&2
            exit 1
          fi

          echo "intel_sha=${INTEL_SHA}" >> "$GITHUB_OUTPUT"
          echo "arm_sha=${ARM_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Render formula
        shell: bash
        run: |
          python3 .github/scripts/update_homebrew_formula.py \
            --formula "homebrew-tap/${FORMULA_PATH}" \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${{ needs.resolve_tag.outputs.tag }}" \
            --version "${{ needs.resolve_tag.outputs.version }}" \
            --binary "${BINARY_NAME}" \
            --sha-intel "${{ steps.sha.outputs.intel_sha }}" \
            --sha-arm "${{ steps.sha.outputs.arm_sha }}"

      - name: Commit and push tap update
        shell: bash
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z "$(git status --porcelain -- "${FORMULA_PATH}")" ]]; then
            echo "Formula already up to date."
            exit 0
          fi

          git add "${FORMULA_PATH}"
          git commit -m "vibereview ${{ needs.resolve_tag.outputs.version }}"
          git push origin HEAD:"${TAP_BRANCH}"

  update_apt:
    name: Update APT Repository
    needs:
      - resolve_tag
      - publish
    runs-on: ubuntu-latest
    env:
      PACKAGES_REPO: daulet/packages
      PACKAGES_REPO_TOKEN: ${{ secrets.PACKAGES_REPO_TOKEN || secrets.TAP_GITHUB_TOKEN || secrets.HOMEBREW_TAP_TOKEN }}
      PACKAGE_RELEASE_TAG: vibereview-${{ needs.resolve_tag.outputs.tag }}
    steps:
      - name: Check packages token
        id: packages_token
        shell: bash
        run: |
          if [[ -n "${PACKAGES_REPO_TOKEN}" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=APT repository update skipped::Set PACKAGES_REPO_TOKEN with contents write access to ${PACKAGES_REPO}."
          fi

      - name: Download build artifacts
        if: steps.packages_token.outputs.available == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Resolve Debian package assets
        if: steps.packages_token.outputs.available == 'true'
        id: debs
        shell: bash
        run: |
          AMD64_DEB="$(find dist -maxdepth 1 -type f -name '*.deb' | grep -E '[_-]amd64\.deb$' | sort | head -n1)"
          ARM64_DEB="$(find dist -maxdepth 1 -type f -name '*.deb' | grep -E '[_-]arm64\.deb$' | sort | head -n1)"

          if [[ -z "${AMD64_DEB}" || -z "${ARM64_DEB}" ]]; then
            echo "Failed to locate amd64 and arm64 .deb artifacts in dist" >&2
            ls -la dist >&2
            exit 1
          fi

          {
            echo "amd64_name=$(basename "${AMD64_DEB}")"
            echo "amd64_sha=$(sha256sum "${AMD64_DEB}" | awk '{print $1}')"
            echo "arm64_name=$(basename "${ARM64_DEB}")"
            echo "arm64_sha=$(sha256sum "${ARM64_DEB}" | awk '{print $1}')"
          } >> "$GITHUB_OUTPUT"

      - name: Publish Debian packages to packages repository release
        if: steps.packages_token.outputs.available == 'true'
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.PACKAGES_REPO }}
          token: ${{ env.PACKAGES_REPO_TOKEN }}
          tag_name: ${{ env.PACKAGE_RELEASE_TAG }}
          name: ${{ env.BINARY_NAME }} ${{ needs.resolve_tag.outputs.tag }} Debian packages
          files: dist/*.deb
          overwrite_files: true

      - name: Checkout packages repository
        if: steps.packages_token.outputs.available == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PACKAGES_REPO }}
          token: ${{ env.PACKAGES_REPO_TOKEN }}
          path: packages

      - name: Update packages manifest
        if: steps.packages_token.outputs.available == 'true'
        shell: bash
        run: |
          python3 packages/scripts/update-package.py \
            --manifest packages/packages.json \
            --name "${BINARY_NAME}" \
            --repo "${PACKAGES_REPO}" \
            --tag "${PACKAGE_RELEASE_TAG}" \
            --version "${{ needs.resolve_tag.outputs.version }}" \
            --asset "amd64:${{ steps.debs.outputs.amd64_name }}:${{ steps.debs.outputs.amd64_sha }}" \
            --asset "arm64:${{ steps.debs.outputs.arm64_name }}:${{ steps.debs.outputs.arm64_sha }}"

      - name: Commit and push packages manifest
        if: steps.packages_token.outputs.available == 'true'
        shell: bash
        run: |
          cd packages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z "$(git status --porcelain -- packages.json)" ]]; then
            echo "APT package manifest already up to date."
            exit 0
          fi

          git add packages.json
          git commit -m "${BINARY_NAME} ${{ needs.resolve_tag.outputs.version }}"
          git pull --rebase origin main
          git push origin HEAD:main

